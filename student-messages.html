<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>

<script src="sessionGuard.js"></script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedClarivo Elite | Messages</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        navy: "#0A1424", "navy-2": "#0F2038", "navy-3": "#16304F",
        teal: "#0FA89A", "teal-2": "#33D9C8", "teal-deep": "#0A6E64",
        gold: "#B9924F", "gold-soft": "rgba(185,146,79,0.12)",
        mist: "#F5F7FA", "mist-2": "#EEF2F6",
        ink: "#0B1220", "ink-soft": "#56657B", "ink-faint": "#8B97A8",
        line: "rgba(11,18,32,0.08)",
      },
      fontFamily: { display: ["DM Serif Display", "serif"], sans: ["DM Sans", "sans-serif"], mono: ["JetBrains Mono", "monospace"] },
    }}
  }
</script>
<style>
  :root{ --navy:#0A1424; --navy-2:#0F2038; --navy-3:#16304F; --teal:#0FA89A; --teal-2:#33D9C8; --teal-deep:#0A6E64; --gold:#B9924F; --mist:#F5F7FA; --ink:#0B1220; --ink-soft:#56657B; }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'DM Sans', sans-serif;background:var(--mist);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100dvh;}
  .font-display{font-family:'DM Serif Display', serif;}

  .app-shell{display:flex; min-height:100dvh;}
  .sidebar{position:fixed; left:16px; top:16px; bottom:16px; width:260px; border-radius:24px; background:linear-gradient(174deg, var(--navy-2) 0%, var(--navy) 78%); box-shadow:0 20px 50px -20px rgba(10,20,36,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset; display:flex; flex-direction:column; z-index:60; transition:transform .35s cubic-bezier(.4,0,.2,1), width .3s ease; overflow:hidden;}
  .sidebar.collapsed{ width:84px; }
  .sidebar.collapsed .hide-on-collapse{ display:none; }
  .sidebar.collapsed .nav-item{ justify-content:center; padding-left:0; padding-right:0; }
  .sidebar.collapsed .nav-item .nav-label{ display:none; }
  @media (max-width:1023px){ .sidebar{ transform:translateX(-130%); } .sidebar.open{ transform:translateX(0); } }
  .main-content{ margin-left:292px; flex:1; min-width:0; transition:margin-left .3s ease; }
  .main-content.collapsed{ margin-left:116px; }
  @media (max-width:1023px){ .main-content, .main-content.collapsed{ margin-left:0; } }

  .nav-item{ display:flex; align-items:center; gap:12px; padding:10px 16px; border-radius:14px; color:rgba(255,255,255,0.52); font-size:13.5px; font-weight:500; cursor:pointer; transition:all .2s ease; margin:1px 12px; text-decoration:none; position:relative; }
  .nav-item:hover{ background:rgba(255,255,255,0.06); color:#fff; transform:translateX(2px); }
  .nav-item.active{ background:rgba(15,168,154,0.16); color:#7FE9DD; }
  .nav-item.active::before{ content:''; position:absolute; left:-12px; top:50%; transform:translateY(-50%); width:3px; height:18px; border-radius:3px; background:linear-gradient(180deg, var(--teal-2), var(--teal)); }
  .nav-item svg{ width:18px; height:18px; flex-shrink:0; }
  .avatar-ring{ border:2px solid var(--teal); padding:2px; border-radius:999px; }

  .topbar{ position:sticky; top:16px; z-index:50; margin:0 16px 0 0; border-radius:20px; background:rgba(255,255,255,0.78); backdrop-filter:blur(18px) saturate(160%); border:1px solid rgba(255,255,255,0.7); box-shadow:0 8px 28px -16px rgba(11,18,32,0.18); }
  .panel{ background:#fff; border:1px solid var(--line); border-radius:22px; box-shadow:0 1px 2px rgba(11,18,32,0.04), 0 12px 28px -18px rgba(11,18,32,0.10); }

  .btn-primary{ background:linear-gradient(135deg, var(--teal) 0%, var(--teal-deep) 100%); color:#fff; border:none; border-radius:14px; font-weight:700; box-shadow:0 10px 24px -8px rgba(15,168,154,0.55); transition:all .2s cubic-bezier(.4,0,.2,1); }
  .btn-primary:hover{ transform:translateY(-2px); box-shadow:0 16px 32px -8px rgba(15,168,154,0.6); }
  .btn-ghost-icon{ width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); transition:all .18s ease; cursor:pointer; }
  .btn-ghost-icon:hover{ background:rgba(11,18,32,0.05); color:var(--ink); }
  .chip{ display:inline-flex; align-items:center; gap:4px; border-radius:999px; font-size:11px; font-weight:700; padding:3px 10px; }
  .chip-teal{ background:rgba(15,168,154,0.12); color:var(--teal-deep); }

  .contact-row{ display:flex; align-items:center; gap:10px; padding:12px; border-radius:14px; cursor:pointer; transition:background .15s ease; }
  .contact-row:hover{ background:var(--mist-2); }
  .contact-row.active{ background:rgba(15,168,154,0.1); }
  .contact-avatar{ width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:13px; flex-shrink:0; background:linear-gradient(135deg,var(--teal),var(--teal-deep)); }

  .no-scrollbar::-webkit-scrollbar{ display:none; }
  .no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }

  [data-tip]{ position:relative; }
  [data-tip]:hover::after{ content:attr(data-tip); position:absolute; bottom:120%; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; font-size:11px; white-space:nowrap; padding:5px 9px; border-radius:8px; pointer-events:none; z-index:99; font-weight:500; }
</style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="px-5 pt-5 pb-4 flex items-center justify-between">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style="background:linear-gradient(135deg,var(--teal),var(--teal-deep));">
          <i data-lucide="cross" class="w-[18px] h-[18px] text-white"></i>
        </div>
        <div class="hide-on-collapse min-w-0">
          <p class="font-display text-white text-[17px] leading-none tracking-tight">MedClarivo</p>
          <p class="text-[9.5px] text-teal-2 font-bold tracking-[0.18em] uppercase mt-1">Elite</p>
        </div>
      </div>
      <button class="hide-on-collapse btn-ghost-icon text-white/40 hover:text-white hover:bg-white/8" onclick="toggleCollapse()" data-tip="Collapse">
        <i data-lucide="panel-left-close" class="w-[17px] h-[17px]"></i>
      </button>
    </div>

    <div class="mx-3 mb-3 p-2.5 rounded-2xl bg-white/5 flex items-center gap-3">
      <div class="avatar-ring flex-shrink-0">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs font-display" id="sidebarAvatar" style="background:linear-gradient(135deg,var(--teal),var(--teal-deep));">—</div>
      </div>
      <div class="hide-on-collapse flex-1 min-w-0">
        <p class="text-white font-semibold text-[13px] truncate" id="sidebarName">—</p>
        <p class="text-white/35 text-[10.5px] truncate">Student</p>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto no-scrollbar py-1">
      <p class="hide-on-collapse px-6 py-2 text-[10px] text-white/25 uppercase tracking-[0.16em] font-bold">Main</p>
      <a href="dashboard.html" class="nav-item" data-tip="Dashboard">
        <i data-lucide="layout-dashboard"></i><span class="nav-label">Dashboard</span>
      </a>
      <a href="analytics.html" class="nav-item" data-tip="Analytics">
        <i data-lucide="bar-chart-3"></i><span class="nav-label">Analytics</span>
      </a>

      <p class="hide-on-collapse px-6 py-2 mt-3 text-[10px] text-white/25 uppercase tracking-[0.16em] font-bold">Mentorship</p>
      <a href="dashboard.html#mentorCard" class="nav-item" data-tip="My Mentor">
        <i data-lucide="users"></i><span class="nav-label">My Mentor</span>
      </a>
      <a href="dashboard.html#sessionsSection" class="nav-item" data-tip="Sessions">
        <i data-lucide="video"></i><span class="nav-label">Sessions</span>
      </a>
      <a href="student-messages.html" class="nav-item active" data-tip="Messages">
        <i data-lucide="message-circle"></i><span class="nav-label flex-1">Messages</span>
        <span id="unreadBadge" class="hide-on-collapse chip chip-teal" style="padding:1px 7px;font-size:9.5px;display:none">0</span>
      </a>

      <p class="hide-on-collapse px-6 py-2 mt-3 text-[10px] text-white/25 uppercase tracking-[0.16em] font-bold">Support</p>
      <a href="raise-ticket.html" class="nav-item" data-tip="Raise a Ticket">
        <i data-lucide="shield-alert"></i><span class="nav-label">Raise a Ticket</span>
      </a>
    </nav>

    <button id="signOutBtn" class="nav-item mb-4 text-red-300/70 hover:text-red-300 hover:bg-red-500/10" data-tip="Sign Out" style="background:none;border:none;cursor:pointer;font:inherit;text-align:left;">
      <i data-lucide="log-out"></i><span class="nav-label">Sign Out</span>
    </button>
  </aside>

  <div class="main-content" id="mainContent">
    <header class="topbar mx-4 mt-4 lg:mx-6 lg:mt-4 h-16 flex items-center justify-between px-4 md:px-5">
      <div class="flex items-center gap-2">
        <button class="lg:hidden btn-ghost-icon" onclick="document.getElementById('sidebar').classList.add('open')">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <div>
          <p class="font-display text-ink text-lg leading-none">Messages</p>
          <p class="text-ink-faint text-xs mt-0.5">Message your mentor, or reach the admin team directly</p>
        </div>
      </div>
    </header>

    <div class="px-4 lg:px-6 pb-16 max-w-5xl mx-auto mt-2">
      <div class="panel grid grid-cols-1 md:grid-cols-[240px_1fr]" style="height:calc(100vh - 140px);">

        <!-- Contact list -->
        <div class="border-b md:border-b-0 md:border-r border-line p-4">
          <p class="text-ink-faint text-[11px] uppercase tracking-wider font-semibold mb-3 px-1">Contacts</p>
          <div id="contactList" class="space-y-1">
            <p class="text-ink-faint text-sm px-2">Loading…</p>
          </div>
        </div>

        <!-- Thread -->
        <div class="flex flex-col p-5">
          <div id="threadHeader" class="hidden items-center gap-3 pb-4 mb-4 border-b border-line">
            <div class="contact-avatar" id="threadAvatar">—</div>
            <div>
              <p class="font-semibold text-ink text-sm" id="threadName">—</p>
              <p class="text-ink-faint text-xs" id="threadRole">—</p>
            </div>
          </div>

          <div id="threadEmptyState" class="flex-1 flex flex-col items-center justify-center text-center py-12">
            <i data-lucide="message-circle" class="w-9 h-9 text-ink-faint mb-3"></i>
            <p class="text-ink-faint text-sm">Choose a contact to start messaging.</p>
          </div>

          <div id="threadBody" class="hidden flex-1 flex flex-col">
            <div id="thread" class="flex-1 flex flex-col justify-end space-y-4 mb-5 overflow-y-auto" style="max-height:none;">
            </div>
            <div class="border-t border-line pt-4 flex gap-2">
              <input id="replyInput" type="text" placeholder="Type a message…" class="flex-1 border border-line rounded-xl px-3.5 py-2.5 text-sm outline-none" style="border-color:var(--line);"/>
              <button class="btn-primary flex items-center gap-2 px-5" id="sendBtn">
                <i data-lucide="send" class="w-4 h-4"></i>Send
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'https://med-clarivo.onrender.com/api';
  function getToken() { return localStorage.getItem('mc_token') || localStorage.getItem('admin_token'); }
  const token = getToken();
  if (!token) window.location.href = 'index.html';

  let activeContactId = null;
  let contacts = [];
  let meId = null;

  lucide.createIcons();

  function toggleCollapse(){
    document.getElementById('sidebar').classList.toggle('collapsed');
    document.getElementById('mainContent').classList.toggle('collapsed');
  }

  document.getElementById('signOutBtn').addEventListener('click', () => {
    localStorage.removeItem('mc_token'); localStorage.removeItem('admin_token'); localStorage.removeItem('mc_user');
    window.location.href = 'index.html';
  });

  function initials(name) { return (name || '?').split(' ').map(p => p[0]).slice(0,2).join('').toUpperCase(); }
  function roleLabel(role) {
    const map = { mentor: 'Your Mentor', admin: 'Admin', super_admin: 'Super Admin' };
    return map[role] || role;
  }

  async function loadMe() {
    try {
      const res = await fetch(`${API_BASE}/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (res.ok && data.success) {
        meId = data.user._id;
        document.getElementById('sidebarName').textContent = data.user.name || data.user.email;
        document.getElementById('sidebarAvatar').textContent = initials(data.user.name)[0];
      }
    } catch (e) {}
  }

  async function loadUnreadCount() {
    try {
      const res = await fetch(`${API_BASE}/student/messages/unread-count`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (res.ok && data.success && data.count > 0) {
        const badge = document.getElementById('unreadBadge');
        badge.textContent = data.count;
        badge.style.display = 'inline-flex';
      }
    } catch (e) {}
  }

  async function loadContacts() {
    try {
      const [contactsRes, convosRes] = await Promise.all([
        fetch(`${API_BASE}/student/messages/contacts`, { headers: { Authorization: `Bearer ${token}` } }),
        fetch(`${API_BASE}/student/messages/conversations`, { headers: { Authorization: `Bearer ${token}` } }),
      ]);
      const contactsData = await contactsRes.json();
      const convosData = await convosRes.json();

      if (!contactsRes.ok || !contactsData.success) throw new Error(contactsData.message || 'Failed to load contacts.');

      const unreadByUser = {};
      if (convosData.success) {
        (convosData.conversations || []).forEach(c => { unreadByUser[c.otherUser._id] = c.unread; });
      }

      contacts = contactsData.contacts || [];
      const listEl = document.getElementById('contactList');

      if (contacts.length === 0) {
        listEl.innerHTML = '<p class="text-ink-faint text-sm px-2">No contacts available yet.</p>';
        return;
      }

      listEl.innerHTML = contacts.map(c => {
        const unread = unreadByUser[c._id] || 0;
        return `
          <div class="contact-row" id="contact-${c._id}" onclick="openThread('${c._id}')">
            <div class="contact-avatar">${initials(c.name)}</div>
            <div class="flex-1 min-w-0">
              <p class="font-semibold text-ink text-sm truncate">${c.name}</p>
              <p class="text-ink-faint text-xs truncate">${roleLabel(c.role)}</p>
            </div>
            ${unread > 0 ? `<span class="chip chip-teal">${unread}</span>` : ''}
          </div>
        `;
      }).join('');
    } catch (err) {
      document.getElementById('contactList').innerHTML = `<p class="text-red-600 text-sm px-2">${err.message}</p>`;
    }
  }

  function bubbleHTML(m) {
    const mine = m.sender === meId || m.sender._id === meId;
    const time = new Date(m.createdAt).toLocaleString('en', { day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit' });
    return `<div style="display:flex;flex-direction:column;align-items:${mine ? 'flex-end' : 'flex-start'}">
      <div style="max-width:75%;padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.5;
                  background:${mine ? 'var(--navy)' : 'var(--mist-2)'};color:${mine ? '#fff' : 'var(--ink)'}">
        ${m.content.replace(/</g, '&lt;')}
      </div>
      <span class="text-ink-faint text-[10.5px] mt-1">${time}</span>
    </div>`;
  }

  async function openThread(contactId) {
    activeContactId = contactId;
    document.querySelectorAll('.contact-row').forEach(el => el.classList.remove('active'));
    const row = document.getElementById(`contact-${contactId}`);
    if (row) row.classList.add('active');

    const contact = contacts.find(c => c._id === contactId);
    document.getElementById('threadHeader').classList.remove('hidden');
    document.getElementById('threadHeader').classList.add('flex');
    document.getElementById('threadAvatar').textContent = initials(contact.name);
    document.getElementById('threadName').textContent = contact.name;
    document.getElementById('threadRole').textContent = roleLabel(contact.role);
    document.getElementById('threadEmptyState').classList.add('hidden');
    document.getElementById('threadBody').classList.remove('hidden');
    document.getElementById('threadBody').classList.add('flex');

    const threadEl = document.getElementById('thread');
    threadEl.innerHTML = '<p class="text-ink-faint text-sm text-center py-8">Loading…</p>';

    try {
      const res = await fetch(`${API_BASE}/student/messages/with/${contactId}`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.message || 'Failed to load conversation.');

      if (data.messages.length === 0) {
        threadEl.innerHTML = '<p class="text-ink-faint text-sm text-center py-8">No messages yet — say hello!</p>';
      } else {
        threadEl.innerHTML = data.messages.map(bubbleHTML).join('');
        threadEl.scrollTop = threadEl.scrollHeight;
      }

      loadUnreadCount();
      loadContacts();
    } catch (err) {
      threadEl.innerHTML = `<p class="text-red-600 text-sm text-center py-8">${err.message}</p>`;
    }
  }

  async function sendMessage() {
    const input = document.getElementById('replyInput');
    const content = input.value.trim();
    if (!content || !activeContactId) return;

    try {
      const res = await fetch(`${API_BASE}/student/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ recipientId: activeContactId, content }),
      });
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.message || 'Failed to send message.');

      input.value = '';
      openThread(activeContactId);
    } catch (err) {
      alert(err.message);
    }
  }

  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('replyInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  loadMe();
  loadContacts();
  loadUnreadCount();
</script>

</body>
</html>
