name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sS -o /dev/null -w "Status: %{http_code}\n" https://med-clarivo.onrender.com/health || true
