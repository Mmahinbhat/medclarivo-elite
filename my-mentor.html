<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Mentor — MedClarivo Elite</title>
<style>
  :root {
    --teal: #14b8a6;
    --teal-dark: #0d9488;
    --navy: #0f172a;
    --navy-light: #1e2937;
    --bg: #f8f9fb;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
    --high: #ef4444;
    --medium: #f59e0b;
    --low: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .layout { display: flex; min-height: 100vh; }

  /* Sidebar (kept minimal — replace with your actual shared sidebar include) */
  .sidebar {
    width: 260px;
    background: var(--navy);
    color: #cbd5e1;
    flex-shrink: 0;
    padding: 20px 16px;
  }
  .sidebar .brand { display:flex; align-items:center; gap:10px; margin-bottom: 24px; }
  .sidebar .brand .logo { width:36px; height:36px; background:var(--teal); border-radius:10px; }
  .sidebar .brand h1 { font-size: 18px; color:#fff; font-family: Georgia, serif; }
  .sidebar .brand span { display:block; font-size: 10px; letter-spacing: 1px; color: var(--teal); }
  .sidebar a {
    display:block; padding: 10px 12px; border-radius: 8px; color: #cbd5e1;
    text-decoration:none; font-size: 14px; margin-bottom: 4px;
  }
  .sidebar a.active, .sidebar a:hover { background: rgba(20,184,166,0.15); color: var(--teal); }

  main { flex: 1; padding: 32px 40px; max-width: 1100px; }
  h2.page-title { font-family: Georgia, serif; font-size: 26px; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  .grid { display:grid; grid-template-columns: 1.3fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px;
  }
  .mentor-header { display:flex; gap:16px; align-items:center; margin-bottom: 18px; }
  .avatar {
    width: 60px; height:60px; border-radius:50%; background: var(--navy); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:22px; font-family:Georgia,serif;
  }
  .mentor-header h3 { font-size: 19px; font-family: Georgia, serif; }
  .mentor-header p { color: var(--muted); font-size: 13px; margin-top:2px; }
  .bio { color:#374151; font-size: 14px; line-height:1.6; margin-bottom: 18px; }
  .tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 20px; }
  .tag {
    background:#f0fdfa; color:var(--teal-dark); border:1px solid #99f6e4;
    font-size:12px; padding:4px 10px; border-radius:999px; font-weight:600;
  }
  .actions { display:flex; gap:10px; }
  .btn {
    padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight:600;
    border:none; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px;
  }
  .btn-primary { background: var(--teal); color:#fff; }
  .btn-primary:hover { background: var(--teal-dark); }
  .btn-secondary { background:#fff; color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:#f9fafb; }
  .link-muted { color: var(--muted); font-size: 13px; text-decoration:none; }
  .link-muted:hover { color: var(--text); }

  .stat-row { display:flex; justify-content:space-between; margin-bottom: 14px; }
  .stat-row:last-child { margin-bottom:0; }
  .stat-label { font-size: 13px; color: var(--muted); }
  .stat-value { font-size: 15px; font-weight:700; }

  .section-title { font-size: 17px; font-family: Georgia, serif; margin-bottom: 14px; }

  table { width:100%; border-collapse: collapse; font-size: 14px; }
  th { text-align:left; color: var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; padding-bottom:10px; border-bottom:1px solid var(--border); }
  td { padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
  .badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; }
  .badge-completed { background:#ecfdf5; color:#059669; }
  .badge-upcoming { background:#eff6ff; color:#2563eb; }
  .badge-missed { background:#fef2f2; color:#dc2626; }

  .empty-state { text-align:center; padding: 40px 0; color: var(--muted); font-size: 14px; }

  .request-change {
    margin-top: 16px; font-size: 13px; text-align:center;
  }
  .loading { text-align:center; padding: 60px 0; color: var(--muted); }
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="brand">
      <div class="logo"></div>
      <div><h1>MedClarivo</h1><span>ELITE</span></div>
    </div>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/progress.html">Progress</a>
    <a href="/content-library.html">Content Library</a>
    <a href="/analytics.html">Analytics</a>
    <a href="/my-mentor.html" class="active">My Mentor</a>
    <a href="/sessions.html">Sessions</a>
    <a href="/doubt-forum.html">Doubt Forum</a>
    <a href="/messages.html">Messages</a>
  </aside>

  <main>
    <h2 class="page-title">My Mentor</h2>
    <p class="subtitle">Everything about your mentorship in one place.</p>

    <div id="content" class="loading">Loading mentor details…</div>
  </main>
</div>

<script>
const studentId = window.CURRENT_STUDENT_ID || null; // wire this to your auth/session context

async function loadMentor() {
  const container = document.getElementById('content');
  try {
    const res = await fetch('/api/mentor/my-mentor', { credentials: 'include' });
    if (!res.ok) throw new Error('no mentor assigned');
    const data = await res.json();
    render(data);
  } catch (err) {
    renderNoMentor();
  }
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function render(data) {
  const m = data.mentor;
  const stats = data.stats || {};
  const upcoming = data.upcomingSessions || [];
  const history = data.sessionHistory || [];

  document.getElementById('content').innerHTML = `
    <div class="grid">
      <div class="card">
        <div class="mentor-header">
          <div class="avatar">${initials(m.name)}</div>
          <div>
            <h3>${m.name}</h3>
            <p>${m.credentials || ''}</p>
          </div>
        </div>
        <p class="bio">${m.bio || 'No bio added yet.'}</p>
        <div class="tags">
          ${(m.specialties || []).map(s => `<span class="tag">${s}</span>`).join('')}
        </div>
        <div class="actions">
          <a class="btn btn-primary" href="${m.joinLink || '#'}">Join Session</a>
          <a class="btn btn-secondary" href="/messages.html?mentor=${m.id}">Message</a>
        </div>
        <div class="request-change">
          <a class="link-muted" href="/settings.html#mentor-change">Not a good fit? Request a mentor change →</a>
        </div>
      </div>

      <div class="card">
        <div class="section-title">At a Glance</div>
        <div class="stat-row"><span class="stat-label">Total sessions</span><span class="stat-value">${stats.totalSessions ?? 0}</span></div>
        <div class="stat-row"><span class="stat-label">Sessions this month</span><span class="stat-value">${stats.sessionsThisMonth ?? 0}</span></div>
        <div class="stat-row"><span class="stat-label">Avg. session length</span><span class="stat-value">${stats.avgSessionLength ?? '—'}</span></div>
        <div class="stat-row"><span class="stat-label">Open doubts raised</span><span class="stat-value">${stats.openDoubts ?? 0}</span></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="section-title">Upcoming Sessions</div>
      ${upcoming.length ? `
        <table>
          <thead><tr><th>Date</th><th>Time</th><th>Topic</th><th>Status</th></tr></thead>
          <tbody>
            ${upcoming.map(s => `
              <tr>
                <td>${s.date}</td><td>${s.time}</td><td>${s.topic || '—'}</td>
                <td><span class="badge badge-upcoming">Upcoming</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      ` : `<div class="empty-state">No sessions scheduled yet. Sessions booked with your mentor will show up here.</div>`}
    </div>

    <div class="card">
      <div class="section-title">Session History</div>
      ${history.length ? `
        <table>
          <thead><tr><th>Date</th><th>Topic</th><th>Duration</th><th>Notes</th><th>Status</th></tr></thead>
          <tbody>
            ${history.map(s => `
              <tr>
                <td>${s.date}</td><td>${s.topic || '—'}</td><td>${s.duration || '—'}</td>
                <td>${s.notesLink ? `<a class="link-muted" href="${s.notesLink}">View notes</a>` : '—'}</td>
                <td><span class="badge badge-${s.status}">${s.status.charAt(0).toUpperCase() + s.status.slice(1)}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      ` : `<div class="empty-state">No past sessions yet.</div>`}
    </div>
  `;
}

function renderNoMentor() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="empty-state">
        You don't have a mentor assigned yet.<br/>
        <a class="btn btn-primary" style="margin-top:14px;" href="/mentor-request.html">Request a Mentor</a>
      </div>
    </div>
  `;
}

loadMentor();
</script>
</body>
</html>
