<!DOCTYPE html>
<html lang="en">
<head>
<script src="sessionGuard.js"></script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedClarivo Elite | Admin — Messaging</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          navy:        "#0A1424",
          "navy-2":    "#0F2038",
          "navy-3":    "#16304F",
          teal:        "#0FA89A",
          "teal-2":    "#33D9C8",
          "teal-deep": "#0A6E64",
          gold:        "#B9924F",
          "gold-soft": "rgba(185,146,79,0.12)",
          mist:        "#F5F7FA",
          "mist-2":    "#EEF2F6",
          ink:         "#0B1220",
          "ink-soft":  "#56657B",
          "ink-faint": "#8B97A8",
          line:        "rgba(11,18,32,0.08)",
        },
        fontFamily: {
          display: ["DM Serif Display", "serif"],
          sans:    ["DM Sans", "sans-serif"],
          mono:    ["JetBrains Mono", "monospace"],
        },
      }
    }
  }
</script>
<style>
  :root{
    --navy:#0A1424; --navy-2:#0F2038; --navy-3:#16304F;
    --teal:#0FA89A; --teal-2:#33D9C8; --teal-deep:#0A6E64;
    --gold:#B9924F; --mist:#F5F7FA; --ink:#0B1220; --ink-soft:#56657B;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'DM Sans', sans-serif;
    background:var(--mist);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    min-height:100dvh;
  }
  .font-display{font-family:'DM Serif Display', serif;}
  .font-mono{font-family:'JetBrains Mono', monospace;}
  ::selection{background:rgba(15,168,154,0.18);}

  .app-shell{display:flex; min-height:100dvh;}

  .sidebar{
    position:fixed; left:16px; top:16px; bottom:16px;
    width:240px; border-radius:24px;
    background:linear-gradient(174deg, var(--navy-2) 0%, var(--navy) 78%);
    box-shadow:0 20px 50px -20px rgba(10,20,36,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset;
    display:flex; flex-direction:column; z-index:60;
  }
  @media (max-width:1023px){ .sidebar{ transform:translateX(-130%); transition:transform .3s ease; } .sidebar.open{ transform:translateX(0); } }
  .main-content{ margin-left:272px; flex:1; min-width:0; }
  @media (max-width:1023px){ .main-content{ margin-left:0; } }

  .nav-item{
    display:flex; align-items:center; gap:12px;
    padding:10px 16px; border-radius:14px;
    color:rgba(255,255,255,0.52); font-size:13.5px; font-weight:500;
    cursor:pointer; transition:all .2s ease; margin:1px 12px;
    text-decoration:none; position:relative;
  }
  .nav-item:hover{ background:rgba(255,255,255,0.06); color:#fff; }
  .nav-item.active{ background:rgba(15,168,154,0.16); color:#7FE9DD; }
  .nav-item svg{ width:18px; height:18px; flex-shrink:0; }

  .panel{
    background:#fff; border:1px solid var(--line); border-radius:20px;
    box-shadow:0 1px 2px rgba(11,18,32,0.03);
  }
  .topbar{
    position:sticky; top:16px; z-index:50; margin:0 16px 24px 16px;
    border-radius:20px; background:rgba(255,255,255,0.85);
    backdrop-filter:blur(18px) saturate(160%);
    border:1px solid rgba(255,255,255,0.7);
    box-shadow:0 8px 28px -16px rgba(11,18,32,0.18);
    padding:14px 22px; display:flex; align-items:center; justify-content:space-between;
  }

  .conv-item{ display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:14px; cursor:pointer; transition:background .15s ease; }
  .conv-item:hover{ background:var(--mist); }
  .conv-item.active{ background:rgba(15,168,154,0.08); }
  .avatar-circle{ width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--teal),var(--teal-deep)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }

  .bubble{ max-width:72%; padding:10px 14px; border-radius:16px; font-size:13.5px; line-height:1.5; }
  .bubble-mine{ background:linear-gradient(135deg,var(--teal),var(--teal-deep)); color:#fff; border-bottom-right-radius:4px; margin-left:auto; }
  .bubble-theirs{ background:var(--mist); color:var(--ink); border-bottom-left-radius:4px; }

  #messagesScroll{ scrollbar-width:thin; }
</style>
</head>
<body>

<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="px-6 pt-7 pb-5">
      <p class="font-display text-white text-xl leading-none">MedClarivo</p>
      <p class="text-teal-2 text-[11px] tracking-widest uppercase font-semibold mt-1" id="roleLabel">Admin</p>
    </div>
    <nav class="flex-1 px-0 py-2 space-y-1 overflow-y-auto">
      <a class="nav-item" href="admin-dashboard.html"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
      <a class="nav-item" href="admin-users.html"><i data-lucide="users"></i><span>Users</span></a>
      <a class="nav-item" href="admin-mentors.html"><i data-lucide="graduation-cap"></i><span>Mentors</span></a>
      <a class="nav-item" href="admin-students.html"><i data-lucide="user-check"></i><span>Students</span></a>
      <a class="nav-item" href="admin-assignments.html"><i data-lucide="clipboard-list"></i><span>Assignments</span></a>
      <a class="nav-item" href="admin-calendar.html"><i data-lucide="calendar"></i><span>Calendar</span></a>
      <a class="nav-item" href="admin-session-notes.html"><i data-lucide="notebook-pen"></i><span>Session Notes</span></a>
      <a class="nav-item" href="admin-evaluations.html"><i data-lucide="star"></i><span>Evaluations</span></a>
      <a class="nav-item" href="#" onclick="showToast('Content Library coming soon')"><i data-lucide="library"></i><span>Content Library</span></a>
      <a class="nav-item active" href="admin-messages.html"><i data-lucide="message-circle"></i><span>Messaging</span></a>
      <a class="nav-item" href="#" onclick="showToast('Payments coming soon')"><i data-lucide="credit-card"></i><span>Payments</span></a>
      <a class="nav-item" href="#" onclick="showToast('Reports coming soon')"><i data-lucide="bar-chart-3"></i><span>Reports</span></a>
      <a class="nav-item" href="admin-permissions.html"><i data-lucide="shield"></i><span>Permissions</span></a>
      <a class="nav-item" href="admin-audit.html"><i data-lucide="scroll-text"></i><span>Audit Log</span></a>
      <a class="nav-item" href="admin-tickets.html"><i data-lucide="shield-alert"></i><span>Tickets</span></a>
      <a class="nav-item" href="admin-profile.html"><i data-lucide="user-circle"></i><span>Profile</span></a>
    </nav>
    <div class="px-3 pb-6">
      <a href="#" id="signOutLink" class="nav-item text-red-300/70 hover:text-red-300 hover:bg-red-500/10">
        <i data-lucide="log-out"></i><span>Sign Out</span>
      </a>
    </div>
  </aside>

  <!-- ── Main content ── -->
  <main class="main-content">
    <div class="topbar">
      <div>
        <p class="text-ink font-semibold text-sm" id="adminGreeting">Welcome</p>
        <p class="text-ink-faint text-xs">Message any student directly</p>
      </div>
      <button class="lg:hidden" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <i data-lucide="menu"></i>
      </button>
    </div>

    <div class="px-4 md:px-6 pb-16 max-w-6xl mx-auto">
      <div class="panel overflow-hidden" style="height: calc(100dvh - 140px); display:flex;">

        <!-- ── Student list ── -->
        <div style="width:300px; flex-shrink:0; border-right:1px solid var(--line); display:flex; flex-direction:column;">
          <div class="p-4 border-b" style="border-color:var(--line)">
            <input id="studentSearch" type="text" placeholder="Search students…"
              class="w-full px-3 py-2 rounded-xl bg-mist border border-line text-sm focus:outline-none focus:ring-2 focus:ring-teal/30" />
          </div>
          <div id="studentList" class="flex-1 overflow-y-auto p-2">
            <p class="text-ink-faint text-xs text-center py-6">Loading students…</p>
          </div>
        </div>

        <!-- ── Conversation ── -->
        <div style="flex:1; min-width:0; display:flex; flex-direction:column;">
          <div id="convHeader" class="p-4 border-b flex items-center gap-3" style="border-color:var(--line); display:none;">
            <div class="avatar-circle" id="convAvatar">—</div>
            <div>
              <p class="font-semibold text-ink text-sm" id="convName">—</p>
              <p class="text-ink-faint text-xs" id="convEmail">—</p>
            </div>
          </div>
          <div id="messagesScroll" class="flex-1 overflow-y-auto p-5 space-y-3">
            <div class="h-full flex items-center justify-center text-ink-faint text-sm" id="emptyState">
              Select a student to start messaging
            </div>
          </div>
          <div id="composer" class="p-4 border-t flex items-center gap-2" style="border-color:var(--line); display:none;">
            <input id="messageInput" type="text" placeholder="Type a message…"
              class="flex-1 px-4 py-2.5 rounded-xl bg-mist border border-line text-sm focus:outline-none focus:ring-2 focus:ring-teal/30"
              onkeydown="if(event.key==='Enter') sendMessage()" />
            <button id="sendBtn" onclick="sendMessage()" class="px-4 py-2.5 rounded-xl text-white text-sm font-semibold"
              style="background:linear-gradient(135deg,var(--teal),var(--teal-deep))">
              <i data-lucide="send" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;background:var(--navy);color:#fff;opacity:0;transition:.3s;z-index:999;"></div>

<script>
  const API_BASE = 'https://med-clarivo.onrender.com/api';
  const token = localStorage.getItem('mc_token');
  let allStudents = [];
  let activeStudentId = null;
  let pollTimer = null;

  if (window.lucide) lucide.createIcons();

  document.getElementById('signOutLink').addEventListener('click', (e) => {
    e.preventDefault();
    localStorage.removeItem('mc_token');
    localStorage.removeItem('mc_user');
    window.location.href = 'index.html';
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(80px)'; }, 3000);
  }

  function initials(name) {
    if (!name) return '?';
    return name.split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
  }

  function renderStudentList() {
    const q = (document.getElementById('studentSearch').value || '').toLowerCase();
    const filtered = allStudents.filter(s =>
      (s.name || '').toLowerCase().includes(q) || (s.email || '').toLowerCase().includes(q)
    );
    const container = document.getElementById('studentList');

    if (!filtered.length) {
      container.innerHTML = '<p class="text-ink-faint text-xs text-center py-6">No students found.</p>';
      return;
    }

    container.innerHTML = filtered.map(s => `
      <div class="conv-item ${s._id === activeStudentId ? 'active' : ''}" onclick="openConversation('${s._id}')">
        <div class="avatar-circle">${initials(s.name)}</div>
        <div class="min-w-0">
          <p class="font-medium text-ink text-sm truncate">${s.name || s.email}</p>
          <p class="text-ink-faint text-xs truncate">${s.email}</p>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('studentSearch').addEventListener('input', renderStudentList);

  async function loadStudents() {
    try {
      const res = await fetch(`${API_BASE}/admin/users`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (!res.ok || !data.success) {
        document.getElementById('studentList').innerHTML = '<p class="text-red-600 text-xs text-center py-6">Failed to load students.</p>';
        return;
      }
      allStudents = (data.users || []).filter(u => u.role === 'student');
      renderStudentList();
    } catch (err) {
      console.error(err);
      document.getElementById('studentList').innerHTML = '<p class="text-red-600 text-xs text-center py-6">Network error.</p>';
    }
  }

  async function openConversation(studentId) {
    activeStudentId = studentId;
    renderStudentList();

    const student = allStudents.find(s => s._id === studentId);
    document.getElementById('convHeader').style.display = 'flex';
    document.getElementById('composer').style.display = 'flex';
    document.getElementById('convAvatar').textContent = initials(student?.name);
    document.getElementById('convName').textContent = student?.name || student?.email || '—';
    document.getElementById('convEmail').textContent = student?.email || '';

    await loadMessages();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(loadMessages, 8000); // light polling for new replies
  }

  async function loadMessages() {
    if (!activeStudentId) return;
    try {
      const res = await fetch(`${API_BASE}/mentor/messages/${activeStudentId}`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      const scroll = document.getElementById('messagesScroll');

      if (!res.ok || !data.success) {
        scroll.innerHTML = `<p class="text-red-600 text-xs text-center py-6">${data.message || 'Failed to load messages.'}</p>`;
        return;
      }

      const messages = data.messages || [];
      const wasAtBottom = scroll.scrollTop + scroll.clientHeight >= scroll.scrollHeight - 30;

      if (!messages.length) {
        scroll.innerHTML = '<div class="h-full flex items-center justify-center text-ink-faint text-sm">No messages yet — say hello.</div>';
        return;
      }

      const me = JSON.parse(localStorage.getItem('mc_user') || '{}');
      scroll.innerHTML = messages.map(m => `
        <div class="flex ${m.sender === me._id ? 'justify-end' : 'justify-start'}">
          <div class="bubble ${m.sender === me._id ? 'bubble-mine' : 'bubble-theirs'}">
            ${m.content}
            <div style="font-size:10px; opacity:.6; margin-top:3px;">${new Date(m.createdAt).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}</div>
          </div>
        </div>
      `).join('');

      if (wasAtBottom) scroll.scrollTop = scroll.scrollHeight;
    } catch (err) {
      console.error(err);
    }
  }

  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content || !activeStudentId) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    input.value = '';

    try {
      const res = await fetch(`${API_BASE}/mentor/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ menteeId: activeStudentId, content }),
      });
      const data = await res.json();
      if (!res.ok || !data.success) {
        showToast(data.message || 'Failed to send message.');
        input.value = content; // restore so nothing's lost
        return;
      }
      await loadMessages();
      document.getElementById('messagesScroll').scrollTop = document.getElementById('messagesScroll').scrollHeight;
    } catch (err) {
      showToast('Network error — message not sent.');
      input.value = content;
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  if (!token) {
    window.location.href = 'index.html';
  } else {
    const me = JSON.parse(localStorage.getItem('mc_user') || '{}');
    document.getElementById('adminGreeting').textContent = `Welcome, ${me.name || 'Admin'}`;
    document.getElementById('roleLabel').textContent = me.role === 'super_admin' ? 'Super Admin' : 'Admin';
    loadStudents();
  }
</script>

</body>
</html>
